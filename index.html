<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Coin Index Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Heebo', sans-serif; background: #f0f2f5; color: #1a1a1a; }

    /* Header */
    .header { background: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
    .header-title { font-size: 1.15em; font-weight: 700; }
    .header-stats { font-size: 0.78em; color: #888; }

    /* Toolbar */
    .toolbar { background: white; padding: 10px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #eee; }

    /* Search */
    .search-box { flex: 1; display: flex; align-items: center; gap: 6px; background: #f5f5f5; border-radius: 20px; padding: 7px 12px; }
    .search-box input { border: none; background: none; font-family: inherit; font-size: 0.85em; width: 100%; outline: none; color: #333; }
    .search-icon { color: #aaa; font-size: 0.9em; }

    /* Filter button */
    .filter-btn { background: white; border: 1.5px solid #e0e0e0; border-radius: 20px; padding: 7px 12px; font-size: 0.82em; font-weight: 600; cursor: pointer; font-family: inherit; color: #555; display: flex; align-items: center; gap: 5px; white-space: nowrap; transition: all 0.15s; }
    .filter-btn.has-filters { background: #2e7d32; color: white; border-color: #2e7d32; }

    /* Active filters row */
    .active-filters { display: none; background: white; padding: 8px 16px; gap: 6px; overflow-x: auto; border-bottom: 1px solid #eee; }
    .active-filters.show { display: flex; }
    .active-filters::-webkit-scrollbar { display: none; }
    .filter-tag { display: flex; align-items: center; gap: 4px; background: #e8f5e9; color: #2e7d32; border-radius: 16px; padding: 4px 10px; font-size: 0.78em; font-weight: 600; white-space: nowrap; }
    .filter-tag button { background: none; border: none; color: #2e7d32; cursor: pointer; font-size: 0.9em; padding: 0; line-height: 1; }

    /* Cols control */
    .cols-control { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .cols-btn { width: 26px; height: 26px; border-radius: 6px; border: 1.5px solid #ddd; background: white; cursor: pointer; font-size: 0.9em; font-weight: 700; color: #555; }
    .cols-num { font-size: 0.85em; font-weight: 700; min-width: 14px; text-align: center; }

    /* Filter Panel */
    .panel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 300; display: none; }
    .panel-overlay.open { display: block; }
    .filter-panel { position: fixed; top: 0; left: 0; bottom: 0; width: 280px; background: white; z-index: 301; transform: translateX(-100%); transition: transform 0.25s ease; overflow-y: auto; }
    .filter-panel.open { transform: translateX(0); }
    .panel-head { padding: 16px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .panel-head h3 { font-size: 1em; font-weight: 700; }
    .panel-close { background: #f0f0f0; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 1em; }
    .panel-section { padding: 14px 16px; border-bottom: 1px solid #f5f5f5; }
    .panel-section h4 { font-size: 0.8em; font-weight: 700; color: #888; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    
    /* Country chips in panel */
    .country-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .p-chip { padding: 5px 10px; border-radius: 16px; border: 1.5px solid #e0e0e0; background: white; font-size: 0.78em; font-weight: 600; cursor: pointer; font-family: inherit; color: #555; transition: all 0.15s; }
    .p-chip.active { background: #2e7d32; color: white; border-color: #2e7d32; }

    /* Material chips with colors */
    .material-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .m-chip { padding: 5px 10px; border-radius: 16px; border: 2px solid transparent; font-size: 0.78em; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .m-chip.active { filter: brightness(0.85); }

    /* Range inputs */
    .range-row { display: flex; gap: 8px; align-items: center; }
    .range-row input { flex: 1; padding: 8px 10px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 0.85em; font-family: inherit; text-align: center; }
    .range-row input:focus { outline: none; border-color: #4caf50; }
    .range-sep { color: #aaa; font-size: 0.8em; }

    /* Reset button in panel */
    .reset-btn { width: 100%; padding: 11px; border: 1.5px solid #e0e0e0; border-radius: 10px; background: white; font-family: inherit; font-size: 0.88em; font-weight: 700; cursor: pointer; color: #888; margin: 14px 16px; width: calc(100% - 32px); }
    .reset-btn:active { background: #f5f5f5; }

    /* Grid */
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 12px; }

    /* Cards */
    .coin-card { background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.07); min-width: 0; width: 100%; }
    .coin-imgs { width: 100%; aspect-ratio: 1/1; overflow-x: auto; display: flex; scroll-snap-type: x mandatory; background: #f5f5f5; position: relative; min-height: 0; }
    .coin-imgs::-webkit-scrollbar { display: none; }
    .coin-img-slide { flex: 0 0 100%; scroll-snap-align: start; }
    .coin-img-slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .coin-no-img { width: 100%; aspect-ratio: 1/1; background: linear-gradient(135deg, #f5f5f5, #e8e8e8); display: flex; align-items: center; justify-content: center; font-size: 2.5em; }
    .comments-badge { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.6); color: white; border-radius: 12px; padding: 3px 8px; font-size: 0.7em; font-weight: 700; }
    .coin-body { padding: 8px 10px 6px; }
    .coin-row1 { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; gap: 4px; }
    .coin-name { font-weight: 700; font-size: 0.88em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
    .coin-price { color: #2e7d32; font-weight: 700; font-size: 0.88em; flex-shrink: 0; }
    .tags { display: flex; flex-wrap: wrap; gap: 3px; }
    .tag { padding: 2px 7px; border-radius: 10px; font-size: 0.68em; font-weight: 600; }
    .tag-c { background: #e8f5e9; color: #2e7d32; }
    .tag-m { font-size: 0.68em; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
    .tag-y { background: #fce4ec; color: #c62828; }
    .card-actions { padding: 6px 10px; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-between; }
    .card-btn { font-size: 0.78em; color: #aaa; cursor: pointer; background: none; border: none; font-family: inherit; padding: 2px 0; }

    /* Add card */
    .add-card { background: #f9fef9; border: 2px dashed #a5d6a7; border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; min-height: 80px; padding: 20px 0; }
    .add-card:active { background: #e8f5e9; }

    /* Modal */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: none; align-items: flex-end; }
    .overlay.open { display: flex; }
    .modal { background: white; border-radius: 22px 22px 0 0; width: 100%; max-height: 92vh; overflow-y: auto; }
    .modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 12px auto 0; }
    .modal-head { padding: 14px 18px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; }
    .modal-title { font-size: 1em; font-weight: 700; }
    .modal-close { background: #f0f0f0; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 1em; cursor: pointer; }
    .modal-body { padding: 14px 18px 30px; }

    .fg { margin-bottom: 13px; }
    .fg label { display: block; font-size: 0.8em; font-weight: 700; color: #555; margin-bottom: 5px; }
    .fg input, .fg select { width: 100%; padding: 11px 14px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 0.95em; font-family: inherit; background: #fafafa; }
    .fg input:focus, .fg select:focus { outline: none; border-color: #4caf50; background: white; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 13px; }

    .ai-section { background: #f8f0ff; border-radius: 12px; padding: 12px; margin-bottom: 14px; border: 1px solid #e1bee7; }
    .ai-head { font-size: 0.82em; font-weight: 700; color: #7b1fa2; margin-bottom: 10px; }
    .ai-imgs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .ai-img-box { border: 1.5px dashed #ce93d8; border-radius: 10px; overflow: hidden; background: white; }
    .ai-img-preview { width: 100%; aspect-ratio: 1; object-fit: cover; display: none; }
    .ai-result { font-size: 0.82em; background: white; border-radius: 8px; padding: 8px; margin-top: 8px; border: 1px solid #e1bee7; display: none; }

    .upload-btns { display: flex; gap: 8px; }
    .upload-btn { flex: 1; background: #f5f5f5; border: 1.5px dashed #ddd; border-radius: 10px; padding: 14px; text-align: center; cursor: pointer; }
    .upload-btn input { display: none; }
    .upload-btn-icon { font-size: 1.4em; display: block; margin-bottom: 4px; }
    .upload-btn-label { font-size: 0.75em; color: #777; font-weight: 600; }
    .img-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .img-prev-item { position: relative; }
    .img-prev-item img { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; display: block; }
    .img-prev-del { position: absolute; top: -4px; left: -4px; background: #ef5350; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 0.65em; cursor: pointer; }

    .comments-section { background: #f9f9f9; border-radius: 12px; padding: 12px; margin-bottom: 13px; }
    .comments-title { font-size: 0.82em; font-weight: 700; color: #555; margin-bottom: 10px; }
    .comment-item { background: white; border-radius: 8px; padding: 8px 28px 8px 10px; margin-bottom: 6px; font-size: 0.82em; position: relative; }
    .comment-del { position: absolute; top: 6px; left: 6px; background: none; border: none; color: #ccc; cursor: pointer; }
    .comment-input-row { display: flex; gap: 8px; margin-top: 8px; }
    .comment-input-row input { flex: 1; padding: 8px 12px; border: 1.5px solid #e0e0e0; border-radius: 20px; font-size: 0.85em; font-family: inherit; }
    .comment-input-row input:focus { outline: none; border-color: #4caf50; }
    .comment-send { background: #4caf50; color: white; border: none; border-radius: 20px; padding: 8px 14px; font-size: 0.85em; cursor: pointer; font-weight: 700; }

    .btn { width: 100%; padding: 13px; border: none; border-radius: 12px; font-size: 0.95em; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 8px; }
    .btn-green { background: #43a047; color: white; }
    .btn-purple { background: #8e24aa; color: white; }
    .btn-red { background: #e53935; color: white; }
    .btn-gray { background: #f0f0f0; color: #444; }
    .btn:active { opacity: 0.8; }
    .btn:disabled { opacity: 0.5; }
    .divider { height: 1px; background: #f0f0f0; margin: 14px 0; }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 22px; border-radius: 22px; font-size: 0.85em; z-index: 999; opacity: 0; transition: opacity 0.25s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .loading { text-align: center; padding: 48px 0; color: #aaa; grid-column: 1/-1; }
    .spin { display: inline-block; width: 28px; height: 28px; border: 3px solid #eee; border-top-color: #4caf50; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .no-results { grid-column: 1/-1; text-align: center; padding: 40px; color: #aaa; font-size: 0.9em; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-title">🪙 Coin Index Pro</div>
  <div class="header-stats" id="stats">טוען...</div>
</div>

<div class="toolbar">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="חיפוש לפי שם..." oninput="render()">
  </div>
  <button class="filter-btn" id="filterBtn" onclick="openPanel()">
    <span>⚙️</span> סינון
  </button>
  <div class="cols-control">
    <button class="cols-btn" onclick="changeCols(-1)">−</button>
    <span class="cols-num" id="colsNum">2</span>
    <button class="cols-btn" onclick="changeCols(1)">+</button>
  </div>
</div>

<!-- Active filter tags -->
<div class="active-filters" id="activeFilters"></div>

<!-- Filter Panel -->
<div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
<div class="filter-panel" id="filterPanel">
  <div class="panel-head">
    <h3>⚙️ סינון</h3>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>

  <div class="panel-section">
    <h4>🌍 מדינה</h4>
    <div class="country-chips" id="countryChips"></div>
  </div>

  <div class="panel-section">
    <h4>⚗️ חומר</h4>
    <div class="material-chips" id="materialChips"></div>
  </div>

  <div class="panel-section">
    <h4>💰 טווח מחיר (₪)</h4>
    <div class="range-row">
      <input type="number" id="priceMin" placeholder="מינ'" oninput="render()">
      <span class="range-sep">—</span>
      <input type="number" id="priceMax" placeholder="מקס'" oninput="render()">
    </div>
  </div>

  <div class="panel-section">
    <h4>📅 טווח שנים</h4>
    <div class="range-row">
      <input type="number" id="yearMin" placeholder="מ-" oninput="render()">
      <span class="range-sep">—</span>
      <input type="number" id="yearMax" placeholder="עד" oninput="render()">
    </div>
  </div>

  <button class="reset-btn" onclick="resetFilters()">🔄 נקה סינון</button>
</div>

<div class="grid" id="grid">
  <div class="loading"><div class="spin"></div><br><br>טוען...</div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <span class="modal-title" id="modalTitle">הוספת מטבע</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">

      <div class="ai-section" id="aiSection">
        <div class="ai-head">🤖 זיהוי אוטומטי עם AI</div>
        <div class="ai-imgs">
          <div class="ai-img-box">
            <div style="padding:8px;text-align:center;">
              <div style="font-size:0.75em;color:#9c27b0;font-weight:700;margin-bottom:6px;">פנים המטבע</div>
              <img class="ai-img-preview" id="aiFrontPrev">
              <div style="display:flex;gap:5px;margin-top:6px;">
                <label style="flex:1;background:#f3e5f5;border-radius:8px;padding:6px;text-align:center;cursor:pointer;font-size:0.72em;color:#9c27b0;font-weight:700;">
                  <input type="file" id="aiFrontFile" accept="image/*" style="display:none" onchange="aiPreview('front',this)">🖼️ גלריה
                </label>
                <label style="flex:1;background:#ede7f6;border-radius:8px;padding:6px;text-align:center;cursor:pointer;font-size:0.72em;color:#7b1fa2;font-weight:700;">
                  <input type="file" id="aiFrontCam" accept="image/*" capture="environment" style="display:none" onchange="aiPreview('front',this)">📸 צלם
                </label>
              </div>
            </div>
          </div>
          <div class="ai-img-box">
            <div style="padding:8px;text-align:center;">
              <div style="font-size:0.75em;color:#9c27b0;font-weight:700;margin-bottom:6px;">גב (אופציונלי)</div>
              <img class="ai-img-preview" id="aiBackPrev">
              <div style="display:flex;gap:5px;margin-top:6px;">
                <label style="flex:1;background:#f3e5f5;border-radius:8px;padding:6px;text-align:center;cursor:pointer;font-size:0.72em;color:#9c27b0;font-weight:700;">
                  <input type="file" id="aiBackFile" accept="image/*" style="display:none" onchange="aiPreview('back',this)">🖼️ גלריה
                </label>
                <label style="flex:1;background:#ede7f6;border-radius:8px;padding:6px;text-align:center;cursor:pointer;font-size:0.72em;color:#7b1fa2;font-weight:700;">
                  <input type="file" id="aiBackCam" accept="image/*" capture="environment" style="display:none" onchange="aiPreview('back',this)">📸 צלם
                </label>
              </div>
            </div>
          </div>
        </div>
        <button class="btn btn-purple" id="identifyBtn" onclick="identifyCoin()">✨ זהה מטבע</button>
        <div class="ai-result" id="aiResult"></div>
      </div>

      <div class="fg"><label>שם המטבע</label><input type="text" id="fName" placeholder="שם..."></div>
      <div class="row2">
        <div class="fg" style="margin-bottom:0"><label>מחיר (₪)</label><input type="number" id="fPrice" placeholder="0"></div>
        <div class="fg" style="margin-bottom:0"><label>שנה</label><input type="text" id="fYear" placeholder="שנה"></div>
      </div>
      <div class="row2" style="margin-top:13px">
        <div class="fg" style="margin-bottom:0">
          <label>מדינה</label>
          <select id="fCountry">
            <option>ישראל</option><option>המנדט הבריטי</option><option>האימפריה העות'מאנית</option>
            <option>פרס / איראן</option><option>מצרים</option><option>סוריה</option><option>לבנון</option>
            <option>ירדן</option><option>עיראק</option><option>ערב הסעודית</option><option>תורכיה</option>
            <option>הודו</option><option>סין</option><option>יפן</option><option>קוריאה</option>
            <option>בריטניה</option><option>צרפת</option><option>גרמניה</option><option>האימפריה הגרמנית</option>
            <option>רייך השלישי</option><option>פרוסיה</option><option>אוסטריה</option>
            <option>האימפריה האוסטרו-הונגרית</option><option>איטליה</option><option>האימפריה הרומית</option>
            <option>ספרד</option><option>פורטוגל</option><option>הולנד</option><option>שוודיה</option>
            <option>פולין</option><option>יוון</option><option>רוסיה</option><option>ברית המועצות</option>
            <option>האימפריה הרוסית</option><option>ארה"ב</option><option>קנדה</option><option>ברזיל</option>
            <option>דרום אפריקה</option><option>מרוקו</option><option>תוניסיה</option><option>אלג'יריה</option>
            <option>לוב</option><option>אחר</option>
          </select>
        </div>
        <div class="fg" style="margin-bottom:0">
          <label>חומר</label>
          <select id="fMaterial">
            <option>כסף</option><option>זהב</option><option>נחושת</option>
            <option>ניקל</option><option>ברונזה</option><option>אלומיניום</option><option>מתכת מעורבת</option>
          </select>
        </div>
      </div>

      <div class="fg" style="margin-top:13px">
        <label>תמונות</label>
        <div class="upload-btns">
          <label class="upload-btn">
            <input type="file" id="fImages" accept="image/*" multiple onchange="previewImgs(this)">
            <span class="upload-btn-icon">🖼️</span>
            <span class="upload-btn-label">גלריה</span>
          </label>
          <label class="upload-btn">
            <input type="file" id="fImagesCam" accept="image/*" capture="environment" onchange="previewImgs(this)">
            <span class="upload-btn-icon">📸</span>
            <span class="upload-btn-label">צלם</span>
          </label>
        </div>
        <div class="img-preview" id="imgPreview"></div>
      </div>

      <div class="divider"></div>
      <div class="comments-section" id="commentsSection" style="display:none">
        <div class="comments-title">💬 תגובות</div>
        <div id="commentsList"></div>
        <div class="comment-input-row">
          <input type="text" id="commentInput" placeholder="כתוב תגובה..." onkeydown="if(event.key==='Enter')addComment()">
          <button class="comment-send" onclick="addComment()">שלח</button>
        </div>
      </div>

      <div class="divider"></div>
      <button class="btn btn-green" id="saveBtn" onclick="saveCoin()">💾 שמור מטבע</button>
      <button class="btn btn-red" id="deleteBtn" onclick="deleteCoin()" style="display:none">🗑️ מחק מטבע</button>
      <button class="btn btn-gray" onclick="closeModal()">ביטול</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://coins-api-qkva.onrender.com';
let coins=[], cols=2;
let editId=null, existImgs=[], newFiles=[], aiFront=null, aiBack=null;
let comments={};

const COUNTRIES = ['ישראל','המנדט הבריטי',"האימפריה העות'מאנית",'פרס / איראן','מצרים','סוריה','לבנון','ירדן','עיראק','ערב הסעודית','תורכיה','הודו','סין','יפן','קוריאה','בריטניה','צרפת','גרמניה','האימפריה הגרמנית','רייך השלישי','פרוסיה','אוסטריה','האימפריה האוסטרו-הונגרית','איטליה','האימפריה הרומית','ספרד','פורטוגל','הולנד','שוודיה','פולין','יוון','רוסיה','ברית המועצות','האימפריה הרוסית','ארה"ב','קנדה','ברזיל','דרום אפריקה','מרוקו','תוניסיה','אלג\'יריה','לוב','אחר'];

const MATERIALS = [
  {name:'כסף', bg:'#e3e8f0', color:'#37474f'},
  {name:'זהב', bg:'#fff8e1', color:'#f57f17'},
  {name:'נחושת', bg:'#fbe9e7', color:'#bf360c'},
  {name:'ניקל', bg:'#ede7f6', color:'#4527a0'},
  {name:'ברונזה', bg:'#efebe9', color:'#4e342e'},
  {name:'אלומיניום', bg:'#e8eaf6', color:'#283593'},
  {name:'מתכת מעורבת', bg:'#f3e5f5', color:'#6a1b9a'},
];

let selCountries = new Set();
let selMaterials = new Set();

function getMaterialStyle(name) {
  const m = MATERIALS.find(x=>x.name===name);
  return m ? `background:${m.bg};color:${m.color}` : 'background:#eee;color:#555';
}

function initPanel() {
  // Country chips
  const cc = document.getElementById('countryChips');
  COUNTRIES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'p-chip';
    btn.textContent = c;
    btn.dataset.val = c;
    btn.onclick = () => {
      if(selCountries.has(c)) selCountries.delete(c);
      else selCountries.add(c);
      btn.classList.toggle('active', selCountries.has(c));
      updateFilterBtn(); render();
    };
    cc.appendChild(btn);
  });
  // Material chips
  const mc = document.getElementById('materialChips');
  MATERIALS.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'm-chip';
    btn.textContent = m.name;
    btn.style.background = m.bg;
    btn.style.color = m.color;
    btn.style.borderColor = m.color+'44';
    btn.onclick = () => {
      if(selMaterials.has(m.name)) selMaterials.delete(m.name);
      else selMaterials.add(m.name);
      btn.classList.toggle('active', selMaterials.has(m.name));
      updateFilterBtn(); render();
    };
    mc.appendChild(btn);
  });
}

function updateFilterBtn() {
  const count = selCountries.size + selMaterials.size
    + (document.getElementById('priceMin').value?1:0)
    + (document.getElementById('priceMax').value?1:0)
    + (document.getElementById('yearMin').value?1:0)
    + (document.getElementById('yearMax').value?1:0);
  const btn = document.getElementById('filterBtn');
  btn.classList.toggle('has-filters', count>0);
  btn.innerHTML = count > 0 ? `⚙️ סינון (${count})` : '⚙️ סינון';
  renderActiveTags();
}

function renderActiveTags() {
  const af = document.getElementById('activeFilters');
  const tags = [];
  selCountries.forEach(c => tags.push({label: '🌍 '+c, remove: ()=>{selCountries.delete(c); document.querySelector(`.p-chip[data-val="${c}"]`)?.classList.remove('active'); updateFilterBtn(); render();}}));
  selMaterials.forEach(m => tags.push({label: '⚗️ '+m, remove: ()=>{selMaterials.delete(m); updateFilterBtn(); render();}}));
  const pMin = document.getElementById('priceMin').value;
  const pMax = document.getElementById('priceMax').value;
  if(pMin||pMax) tags.push({label:`💰 ${pMin||'0'}–${pMax||'∞'}`, remove:()=>{document.getElementById('priceMin').value='';document.getElementById('priceMax').value='';updateFilterBtn();render();}});
  const yMin = document.getElementById('yearMin').value;
  const yMax = document.getElementById('yearMax').value;
  if(yMin||yMax) tags.push({label:`📅 ${yMin||''}–${yMax||''}`, remove:()=>{document.getElementById('yearMin').value='';document.getElementById('yearMax').value='';updateFilterBtn();render();}});
  
  if(tags.length===0){af.classList.remove('show');return;}
  af.classList.add('show');
  af.innerHTML = tags.map((t,i)=>`<div class="filter-tag">${t.label}<button onclick="removetag(${i})">✕</button></div>`).join('');
  window._filterTags = tags;
}
window.removetag = (i) => { window._filterTags[i].remove(); };

function resetFilters() {
  selCountries.clear(); selMaterials.clear();
  document.querySelectorAll('.p-chip,.m-chip').forEach(c=>c.classList.remove('active'));
  document.getElementById('priceMin').value='';
  document.getElementById('priceMax').value='';
  document.getElementById('yearMin').value='';
  document.getElementById('yearMax').value='';
  document.getElementById('searchInput').value='';
  updateFilterBtn(); render();
}

function openPanel() { document.getElementById('filterPanel').classList.add('open'); document.getElementById('panelOverlay').classList.add('open'); }
function closePanel() { document.getElementById('filterPanel').classList.remove('open'); document.getElementById('panelOverlay').classList.remove('open'); }

function initCols() {
  cols = window.innerWidth >= 900 ? 4 : window.innerWidth >= 600 ? 3 : 2;
  document.getElementById('colsNum').textContent = cols;
  applyGrid();
}
function applyGrid() { document.getElementById('grid').style.gridTemplateColumns = `repeat(${cols},1fr)`; }
function changeCols(d) { cols=Math.max(1,Math.min(6,cols+d)); document.getElementById('colsNum').textContent=cols; applyGrid(); }

async function load() {
  try {
    const r = await fetch(`${API}/coins`);
    coins = await r.json();
    const saved = localStorage.getItem('coinComments');
    if(saved) comments = JSON.parse(saved);
    render();
  } catch { document.getElementById('grid').innerHTML='<div class="loading">שגיאה בטעינה</div>'; }
}

function getFiltered() {
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  const pMin = parseFloat(document.getElementById('priceMin').value)||0;
  const pMax = parseFloat(document.getElementById('priceMax').value)||Infinity;
  const yMin = parseInt(document.getElementById('yearMin').value)||0;
  const yMax = parseInt(document.getElementById('yearMax').value)||9999;
  return coins.filter(c => {
    if(search && !(c.name||'').toLowerCase().includes(search)) return false;
    if(selCountries.size && !selCountries.has(c.country)) return false;
    if(selMaterials.size && !selMaterials.has(c.material)) return false;
    const price = parseFloat(c.price)||0;
    if(price < pMin || price > pMax) return false;
    const year = parseInt(c.year)||0;
    if(year && (year < yMin || year > yMax)) return false;
    return true;
  });
}

function render() {
  const list = getFiltered();
  const total = coins.reduce((s,c)=>s+(parseFloat(c.price)||0),0);
  document.getElementById('stats').textContent = `${coins.length} מטבעות | ${total.toLocaleString()} ₪`;
  applyGrid();
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  if(list.length===0 && coins.length>0) {
    grid.innerHTML='<div class="no-results">😕 לא נמצאו מטבעות תואמים</div>';
  }

  list.forEach(c => {
    const imgs = (c.images||'').split('|').filter(u=>u.startsWith('http'));
    const coinComments = comments[String(c.id)]||[];
    const badge = coinComments.length ? `<div class="comments-badge">💬 ${coinComments.length}</div>` : '';
    const imgHtml = imgs.length
      ? `<div class="coin-imgs">${imgs.map(u=>`<div class="coin-img-slide"><img src="${u}" loading="lazy"></div>`).join('')}${badge}</div>`
      : `<div class="coin-no-img">🪙${badge}</div>`;
    const mStyle = getMaterialStyle(c.material);
    const div = document.createElement('div');
    div.className = 'coin-card';
    div.innerHTML = `${imgHtml}
      <div class="coin-body">
        <div class="coin-row1">
          <span class="coin-name">${c.name||''}</span>
          <span class="coin-price">${c.price?c.price+' ₪':''}</span>
        </div>
        <div class="tags">
          <span class="tag tag-c">${c.country||''}</span>
          <span class="tag tag-m" style="${mStyle}">${c.material||''}</span>
          <span class="tag tag-y">${c.year||''}</span>
        </div>
      </div>
      <div class="card-actions">
        <button class="card-btn" onclick="openEdit('${c.id}')">✏️ עריכה</button>
        <button class="card-btn" onclick="shareCoin('${c.id}')">🔗 שתף</button>
      </div>`;
    grid.appendChild(div);
  });

  const add = document.createElement('div');
  add.className='add-card'; add.onclick=openAdd;
  add.innerHTML='<div style="font-size:2em;color:#4caf50">＋</div><div style="font-size:0.78em;color:#4caf50;font-weight:700;margin-top:6px">הוסף מטבע</div>';
  grid.appendChild(add);
}

function shareCoin(id) {
  const c=coins.find(x=>String(x.id)===String(id)); if(!c) return;
  const text=`🪙 ${c.name}\n📅 ${c.year} | 🌍 ${c.country} | ⚗️ ${c.material}\n💰 ${c.price} ₪`;
  if(navigator.share) navigator.share({title:c.name,text});
  else navigator.clipboard.writeText(text).then(()=>toast('📋 הועתק!'));
}

function saveComments() { localStorage.setItem('coinComments',JSON.stringify(comments)); }

function openAdd() {
  editId=null;existImgs=[];newFiles=[];aiFront=null;aiBack=null;
  document.getElementById('modalTitle').textContent='הוספת מטבע חדש';
  ['fName','fPrice','fYear'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fCountry').value='ישראל';
  document.getElementById('fMaterial').value='כסף';
  document.getElementById('fImages').value='';
  document.getElementById('imgPreview').innerHTML='';
  document.getElementById('aiSection').style.display='';
  document.getElementById('deleteBtn').style.display='none';
  document.getElementById('commentsSection').style.display='none';
  document.getElementById('aiFrontPrev').style.display='none';
  document.getElementById('aiBackPrev').style.display='none';
  document.getElementById('aiResult').style.display='none';
  document.getElementById('overlay').classList.add('open');
}

function openEdit(id) {
  const c=coins.find(x=>String(x.id)===String(id)); if(!c) return;
  editId=id;existImgs=(c.images||'').split('|').filter(u=>u.startsWith('http'));newFiles=[];aiFront=null;aiBack=null;
  document.getElementById('modalTitle').textContent='עריכת מטבע';
  document.getElementById('fName').value=c.name||'';
  document.getElementById('fPrice').value=c.price||'';
  document.getElementById('fYear').value=c.year||'';
  document.getElementById('fCountry').value=c.country||'ישראל';
  document.getElementById('fMaterial').value=c.material||'כסף';
  document.getElementById('fImages').value='';
  document.getElementById('aiSection').style.display='none';
  document.getElementById('deleteBtn').style.display='';
  renderPreview(); renderComments(id);
  document.getElementById('commentsSection').style.display='';
  document.getElementById('overlay').classList.add('open');
}

function renderPreview() {
  document.getElementById('imgPreview').innerHTML=
    existImgs.map((u,i)=>`<div class="img-prev-item"><img src="${u}"><button class="img-prev-del" onclick="removeExist(${i})">✕</button></div>`).join('')+
    newFiles.map((f,i)=>`<div class="img-prev-item"><img src="${URL.createObjectURL(f)}"><button class="img-prev-del" onclick="removeNew(${i})">✕</button></div>`).join('');
}
function removeExist(i){existImgs.splice(i,1);renderPreview();}
function removeNew(i){newFiles.splice(i,1);renderPreview();}
function previewImgs(input){newFiles=[...newFiles,...Array.from(input.files)];input.value='';renderPreview();}

function renderComments(id) {
  const list=comments[String(id)]||[];
  document.getElementById('commentsList').innerHTML=list.map((t,i)=>`<div class="comment-item">${t}<button class="comment-del" onclick="deleteComment('${id}',${i})">✕</button></div>`).join('')||'<div style="font-size:0.8em;color:#bbb;margin-bottom:6px">אין תגובות עדיין</div>';
  document.getElementById('commentInput').value='';
}
function addComment(){const t=document.getElementById('commentInput').value.trim();if(!t||!editId)return;if(!comments[String(editId)])comments[String(editId)]=[];comments[String(editId)].push(t);saveComments();renderComments(editId);render();}
function deleteComment(id,i){comments[String(id)].splice(i,1);saveComments();renderComments(id);render();}

function aiPreview(side,input){const f=input.files[0];if(!f)return;if(side==='front'){aiFront=f;const img=document.getElementById('aiFrontPrev');img.src=URL.createObjectURL(f);img.style.display='block';}else{aiBack=f;const img=document.getElementById('aiBackPrev');img.src=URL.createObjectURL(f);img.style.display='block';}}

async function identifyCoin(){
  if(!aiFront){toast('העלה תמונת פנים');return;}
  const btn=document.getElementById('identifyBtn');btn.textContent='🔍 מזהה...';btn.disabled=true;
  try{
    const fd=new FormData();fd.append('front',aiFront);if(aiBack)fd.append('back',aiBack);
    const r=await fetch(`${API}/identify`,{method:'POST',body:fd});
    const d=await r.json();
    if(d.error){toast('שגיאה');return;}
    document.getElementById('fName').value=d.name||'';
    document.getElementById('fPrice').value=d.price||'';
    document.getElementById('fYear').value=d.year||'';
    const countries=[...document.getElementById('fCountry').options].map(o=>o.value);
    const materials=[...document.getElementById('fMaterial').options].map(o=>o.value);
    if(d.country&&countries.includes(d.country))document.getElementById('fCountry').value=d.country;
    if(d.material&&materials.includes(d.material))document.getElementById('fMaterial').value=d.material;
    const res=document.getElementById('aiResult');res.style.display='block';
    res.innerHTML=`✅ <b>${d.name}</b> | ${d.country} | ${d.year} | ${d.material} | ~${d.price} ₪`;
    if(aiFront)newFiles.unshift(aiFront);if(aiBack)newFiles.push(aiBack);renderPreview();
  }catch(e){toast('שגיאת זיהוי');}
  finally{btn.textContent='✨ זהה מטבע';btn.disabled=false;}
}

async function uploadFile(f){const fd=new FormData();fd.append('file',f);const r=await fetch(`${API}/upload`,{method:'POST',body:fd});return(await r.json()).url;}

async function saveCoin(){
  const name=document.getElementById('fName').value.trim();if(!name){toast('נא להזין שם');return;}
  const btn=document.getElementById('saveBtn');btn.textContent='⏳ שומר...';btn.disabled=true;
  try{
    const urls=[];for(const f of newFiles){const u=await uploadFile(f);if(u)urls.push(u);}
    const data={id:editId||String(Date.now()),name,price:document.getElementById('fPrice').value,country:document.getElementById('fCountry').value,material:document.getElementById('fMaterial').value,year:document.getElementById('fYear').value,images:[...existImgs,...urls].join('|'),comments:''};
    if(editId)await fetch(`${API}/coins/${editId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    else await fetch(`${API}/coins`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    closeModal();toast('✅ נשמר!');await load();
  }catch{toast('שגיאה בשמירה');}
  finally{btn.textContent='💾 שמור מטבע';btn.disabled=false;}
}

async function deleteCoin(){
  if(!confirm('למחוק?'))return;
  await fetch(`${API}/coins/${editId}`,{method:'DELETE'});
  if(comments[String(editId)]){delete comments[String(editId)];saveComments();}
  closeModal();toast('נמחק');await load();
}

function closeModal(){document.getElementById('overlay').classList.remove('open');}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeModal();}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

window.addEventListener('resize',()=>{const n=window.innerWidth>=900?4:window.innerWidth>=600?3:2;if(n!==cols){cols=n;document.getElementById('colsNum').textContent=cols;applyGrid();}});

initCols();
initPanel();
load();
</script>
</body>
</html>
