<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Coin Index Pro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Heebo', sans-serif; }
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700&display=swap');
    body { background: #f5f5f5; }
    
    /* Header */
    .header { background: white; padding: 16px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 8px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 100; }
    .header h1 { font-size: 1.2em; font-weight: 700; color: #1a1a1a; }
    .header-stats { font-size: 0.8em; color: #666; }
    
    /* Filter Bar */
    .filter-bar { background: white; padding: 12px 16px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 1px solid #eee; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip { padding: 6px 14px; border-radius: 20px; border: 1px solid #ddd; background: white; font-size: 0.8em; white-space: nowrap; cursor: pointer; transition: all 0.2s; }
    .filter-chip.active { background: #2e7d32; color: white; border-color: #2e7d32; }
    
    /* Grid */
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
    @media (min-width: 600px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 900px) { .grid { grid-template-columns: repeat(4, 1fr); } }
    
    /* Coin Card */
    .coin-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .coin-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: #f0f0f0; }
    .coin-img-placeholder { width: 100%; aspect-ratio: 1; background: linear-gradient(135deg, #f5f5f5, #e0e0e0); display: flex; align-items: center; justify-content: center; font-size: 2em; }
    .coin-info { padding: 10px; }
    .coin-name { font-weight: 700; font-size: 0.9em; color: #1a1a1a; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .coin-price { color: #2e7d32; font-weight: 700; font-size: 1em; }
    .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .tag { padding: 2px 8px; border-radius: 12px; font-size: 0.68em; font-weight: 600; }
    .tag-country { background: #e8f5e9; color: #2e7d32; }
    .tag-material { background: #fff8e1; color: #f57f17; }
    .tag-year { background: #fce4ec; color: #c62828; }
    .edit-btn { width: 100%; padding: 8px; background: #f5f5f5; border: none; border-radius: 0 0 16px 16px; font-size: 0.8em; color: #666; cursor: pointer; margin-top: 4px; }
    .edit-btn:active { background: #e0e0e0; }
    
    /* Add Card */
    .add-card { background: linear-gradient(135deg, #f1fdf4, #e8f5e9); border-radius: 16px; border: 2.5px dashed #81c784; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
    .add-plus { font-size: 2.5em; color: #4caf50; }
    .add-label { font-size: 0.75em; color: #4caf50; font-weight: 600; margin-top: 4px; }
    
    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: flex-end; }
    .modal { background: white; border-radius: 24px 24px 0 0; width: 100%; max-height: 90vh; overflow-y: auto; padding: 20px; }
    .modal-title { font-size: 1.1em; font-weight: 700; margin-bottom: 16px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.85em; font-weight: 600; color: #444; margin-bottom: 6px; }
    .form-group input, .form-group select { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 12px; font-size: 1em; font-family: inherit; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #4caf50; }
    
    /* Image Upload */
    .img-upload { border: 2px dashed #ddd; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; background: #fafafa; }
    .img-upload input { display: none; }
    .img-upload-label { color: #666; font-size: 0.9em; cursor: pointer; }
    .img-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .img-preview img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; }
    .img-preview-item { position: relative; }
    .img-remove { position: absolute; top: -4px; right: -4px; background: red; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 0.7em; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    
    /* AI Box */
    .ai-box { background: linear-gradient(135deg, #e8f4fd, #f3e5f5); border-radius: 12px; padding: 12px; margin-bottom: 14px; border: 1px solid #ce93d8; }
    .ai-title { color: #7b1fa2; font-weight: 700; font-size: 0.85em; margin-bottom: 8px; }
    .ai-result { font-size: 0.85em; color: #333; }
    
    /* Buttons */
    .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 1em; font-weight: 700; cursor: pointer; margin-top: 8px; font-family: inherit; }
    .btn-green { background: #4caf50; color: white; }
    .btn-red { background: #ef5350; color: white; }
    .btn-gray { background: #f5f5f5; color: #333; }
    .btn-purple { background: #9c27b0; color: white; }
    .btn:active { opacity: 0.8; }
    .btn:disabled { opacity: 0.5; }
    
    /* Slideshow */
    .slideshow { width: 100%; aspect-ratio: 1; overflow-x: auto; display: flex; scroll-snap-type: x mandatory; }
    .slideshow::-webkit-scrollbar { display: none; }
    .slide { flex: 0 0 100%; scroll-snap-align: start; }
    .slide img { width: 100%; height: 100%; object-fit: cover; }
    
    /* Loading */
    .loading { text-align: center; padding: 40px; color: #999; }
    .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid #ddd; border-top-color: #4caf50; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .hidden { display: none; }
    .two-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .close-btn { float: left; background: none; border: none; font-size: 1.4em; cursor: pointer; color: #999; }
    
    /* Toast */
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.85em; z-index: 999; opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

    <!-- AI Section -->

      <div class="two-cols">
        <div>

          <label class="img-upload" style="padding:10px;display:block;">

          <label class="img-upload" style="padding:10px;display:block;">
            <input type="file" id="aiBack" accept="image/*" onchange="previewAI('back',this)">

<div class="toast" id="toast"></div>

<script>
const API = 'https://coins-api-qkva.onrender.com';
let coins = [];
let currentFilter = 'all';
let editingId = null;
let existingImages = [];
let newImageFiles = [];
let aiFrontFile = null;
let aiBackFile = null;

async function loadCoins() {
  try {
    const res = await fetch(`${API}/coins`);
    coins = await res.json();
    render();
  } catch(e) {
    document.getElementById('grid').innerHTML = '<div class="loading">שגיאה בטעינה</div>';
  }
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  document.querySelector(`[data-filter="${f}"]`)?.classList.add('active');
  render();
}

function getFiltered() {
  if (currentFilter === 'all') return coins;
  return coins.filter(c => c.country === currentFilter);
}

function render() {
  const filtered = getFiltered();
  const total = coins.reduce((s,c) => s + (parseFloat(c.price)||0), 0);
  document.getElementById('stats').textContent = `${coins.length} מטבעות | ${total.toLocaleString()} ₪`;
  
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  
  filtered.forEach(coin => {
    const imgs = (coin.images||'').split('|').filter(u => u.startsWith('http'));
    const imgHtml = imgs.length > 0
      ? `<div class="slideshow">${imgs.map(u=>`<div class="slide"><img src="${u}" loading="lazy"></div>`).join('')}</div>`
      : `<div class="coin-img-placeholder">🪙</div>`;
    
    const card = document.createElement('div');
    card.className = 'coin-card';
    card.innerHTML = `
      ${imgHtml}
      <div class="coin-info">
        <div class="coin-name">${coin.name}</div>
        <div class="coin-price">${coin.price ? coin.price+' ₪' : ''}</div>
        <div class="tags">
          <span class="tag tag-country">${coin.country||''}</span>
          <span class="tag tag-material">${coin.material||''}</span>
          <span class="tag tag-year">${coin.year||''}</span>
        </div>
      </div>
      <button class="edit-btn" onclick="openEdit('${coin.id}')">✏️ עריכה</button>
    `;
    grid.appendChild(card);
  });
  
  // Add button
  const addCard = document.createElement('div');
  addCard.className = 'add-card';
  addCard.onclick = openAdd;
  addCard.innerHTML = '<div class="add-plus">＋</div><div class="add-label">הוסף חדש</div>';
  grid.appendChild(addCard);
}

function openAdd() {
  editingId = null;
  existingImages = [];
  newImageFiles = [];
  aiFrontFile = null;
  aiBackFile = null;
  document.getElementById('modalTitle').textContent = 'הוספת מטבע חדש';
  document.getElementById('fName').value = '';
  document.getElementById('fPrice').value = '';
  document.getElementById('fYear').value = '';
  document.getElementById('fCountry').value = 'ישראל';
  document.getElementById('fMaterial').value = 'כסף';
  document.getElementById('imgPreview').innerHTML = '';
  document.getElementById('aiSection').style.display = '';
  document.getElementById('deleteBtn').classList.add('hidden');
  document.getElementById('aiFrontPreview').style.display = 'none';
  document.getElementById('aiBackPreview').style.display = 'none';
  document.getElementById('aiFrontLabel').textContent = '📷 העלה';
  document.getElementById('aiBackLabel').textContent = '📷 העלה';
  document.getElementById('aiResult').style.display = 'none';
  document.getElementById('fImages').value = '';
  document.getElementById('modal').classList.remove('hidden');
}

function openEdit(id) {
  const coin = coins.find(c => String(c.id) === String(id));
  if (!coin) return;
  editingId = id;
  existingImages = (coin.images||'').split('|').filter(u => u.startsWith('http'));
  newImageFiles = [];
  aiFrontFile = null;
  aiBackFile = null;
  document.getElementById('modalTitle').textContent = 'עריכת מטבע';
  document.getElementById('fName').value = coin.name||'';
  document.getElementById('fPrice').value = coin.price||'';
  document.getElementById('fYear').value = coin.year||'';
  document.getElementById('fCountry').value = coin.country||'ישראל';
  document.getElementById('fMaterial').value = coin.material||'כסף';
  document.getElementById('aiSection').style.display = 'none';
  document.getElementById('deleteBtn').classList.remove('hidden');
  document.getElementById('fImages').value = '';
  
  const preview = document.getElementById('imgPreview');
  preview.innerHTML = existingImages.map((url,i) => `
    <div class="img-preview-item">
      <img src="${url}">
      <button class="img-remove" onclick="removeExistingImg(${i})">✕</button>
    </div>
  `).join('');
  
  document.getElementById('modal').classList.remove('hidden');
}

function removeExistingImg(i) {
  existingImages.splice(i, 1);
  openEdit(editingId);
}

function previewImages(input) {
  newImageFiles = Array.from(input.files);
  const preview = document.getElementById('imgPreview');
  const existingHtml = existingImages.map((url,i) => `
    <div class="img-preview-item">
      <img src="${url}">
      <button class="img-remove" onclick="removeExistingImg(${i})">✕</button>
    </div>
  `).join('');
  const newHtml = newImageFiles.map((f,i) => {
    const url = URL.createObjectURL(f);
    return `<div class="img-preview-item"><img src="${url}"><button class="img-remove" onclick="removeNewImg(${i})">✕</button></div>`;
  }).join('');
  preview.innerHTML = existingHtml + newHtml;
}

function removeNewImg(i) {
  newImageFiles.splice(i, 1);
  previewImages({ files: newImageFiles });
}

function previewAI(side, input) {
  const file = input.files[0];
  if (!file) return;
  if (side === 'front') {
    aiFrontFile = file;
    document.getElementById('aiFrontLabel').textContent = '✅ ' + file.name.substring(0,10);
    const preview = document.getElementById('aiFrontPreview');
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
  } else {
    aiBackFile = file;
    document.getElementById('aiBackLabel').textContent = '✅ ' + file.name.substring(0,10);
    const preview = document.getElementById('aiBackPreview');
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
  }
}

async function identifyCoin() {
  if (!aiFrontFile) { showToast('העלה תמונה של פנים המטבע'); return; }
  const btn = document.getElementById('identifyBtn');
  btn.textContent = '🔍 מזהה...';
  btn.disabled = true;
  try {
    const fd = new FormData();
    fd.append('front', aiFrontFile);
    if (aiBackFile) fd.append('back', aiBackFile);
    const res = await fetch(`${API}/identify`, { method: 'POST', body: fd });
    const data = await res.json();
    if (data.error) { showToast('שגיאה: ' + data.error); return; }
    document.getElementById('fName').value = data.name||'';
    document.getElementById('fPrice').value = data.price||'';
    document.getElementById('fYear').value = data.year||'';
    if (data.country) document.getElementById('fCountry').value = data.country;
    if (data.material) document.getElementById('fMaterial').value = data.material;
    document.getElementById('aiResult').style.display = 'block';
    document.getElementById('aiResult').innerHTML = `✅ זוהה: <b>${data.name}</b> | ${data.country} | ${data.year} | ~${data.price} ₪`;
    // Add AI images to upload list
    if (aiFrontFile) newImageFiles.unshift(aiFrontFile);
    if (aiBackFile) newImageFiles.push(aiBackFile);
    previewImages({ files: newImageFiles });
  } catch(e) {
    showToast('שגיאת זיהוי');
  } finally {
    btn.textContent = '✨ זהה מטבע';
    btn.disabled = false;
  }
}

async function uploadImage(file) {
  const fd = new FormData();
  fd.append('file', file);
  const res = await fetch(`${API}/upload`, { method: 'POST', body: fd });
  const data = await res.json();
  return data.url;
}

async function saveCoin() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { showToast('נא להזין שם מטבע'); return; }
  
  const btn = document.getElementById('saveBtn');
  btn.textContent = '⏳ שומר...';
  btn.disabled = true;
  
  try {
    // Upload new images
    const uploadedUrls = [];
    for (const file of newImageFiles) {
      const url = await uploadImage(file);
      if (url) uploadedUrls.push(url);
    }
    
    const allImages = [...existingImages, ...uploadedUrls];
    const coinData = {
      id: editingId || String(Date.now()),
      name,
      price: document.getElementById('fPrice').value,
      country: document.getElementById('fCountry').value,
      material: document.getElementById('fMaterial').value,
      year: document.getElementById('fYear').value,
      images: allImages.join('|'),
      comments: ''
    };
    
    if (editingId) {
      await fetch(`${API}/coins/${editingId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(coinData)
      });
    } else {
      await fetch(`${API}/coins`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(coinData)
      });
    }
    
    closeModal();
    showToast('✅ נשמר בהצלחה!');
    await loadCoins();
  } catch(e) {
    showToast('שגיאה בשמירה');
  } finally {
    btn.textContent = '🚀 שמור מטבע';
    btn.disabled = false;
  }
}

async function deleteCoin() {
  if (!confirm('למחוק את המטבע?')) return;
  await fetch(`${API}/coins/${editingId}`, { method: 'DELETE' });
  closeModal();
  showToast('נמחק');
  await loadCoins();
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

loadCoins();
</script>
</body>
</html>
