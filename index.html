<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Coin Index Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Heebo', sans-serif; background: #f0f2f5; color: #1a1a1a; }

    .header { background: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
    .header-title { font-size: 1.15em; font-weight: 700; }
    .header-stats { font-size: 0.78em; color: #888; }

    .toolbar { background: white; padding: 10px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; }
    .filter-scroll { display: flex; gap: 6px; overflow-x: auto; flex: 1; }
    .filter-scroll::-webkit-scrollbar { display: none; }
    .chip { padding: 6px 14px; border-radius: 20px; border: 1.5px solid #e0e0e0; background: white; font-size: 0.8em; white-space: nowrap; cursor: pointer; font-family: inherit; font-weight: 600; color: #555; transition: all 0.15s; }
    .chip.active { background: #2e7d32; color: white; border-color: #2e7d32; }

    .cols-control { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .cols-label { font-size: 0.78em; color: #888; }
    .cols-btn { width: 28px; height: 28px; border-radius: 8px; border: 1.5px solid #ddd; background: white; cursor: pointer; font-size: 1em; font-weight: 700; color: #555; }
    .cols-num { font-size: 0.9em; font-weight: 700; min-width: 16px; text-align: center; }

    .grid { display: grid; gap: 10px; padding: 12px; }

    .coin-card { background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
    .coin-imgs { width: 100%; aspect-ratio: 1; overflow-x: auto; display: flex; scroll-snap-type: x mandatory; background: #f5f5f5; position: relative; }
    .coin-imgs::-webkit-scrollbar { display: none; }
    .coin-img-slide { flex: 0 0 100%; scroll-snap-align: start; }
    .coin-img-slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .coin-no-img { width: 100%; aspect-ratio: 1; background: linear-gradient(135deg, #f5f5f5, #e8e8e8); display: flex; align-items: center; justify-content: center; font-size: 2.5em; }
    
    /* Badge תגובות על התמונה */
    .comments-badge {
      position: absolute; bottom: 8px; right: 8px;
      background: rgba(0,0,0,0.65); color: white;
      border-radius: 12px; padding: 3px 8px;
      font-size: 0.72em; font-weight: 700;
      display: flex; align-items: center; gap: 3px;
    }

    .coin-body { padding: 8px 10px 6px; }
    .coin-row1 { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
    .coin-name { font-weight: 700; font-size: 0.88em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 65%; }
    .coin-price { color: #2e7d32; font-weight: 700; font-size: 0.9em; }
    .tags { display: flex; flex-wrap: wrap; gap: 3px; }
    .tag { padding: 2px 7px; border-radius: 10px; font-size: 0.68em; font-weight: 600; }
    .tag-c { background: #e8f5e9; color: #2e7d32; }
    .tag-m { background: #fff8e1; color: #e65100; }
    .tag-y { background: #fce4ec; color: #c62828; }

    .card-actions { padding: 6px 10px; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-between; }
    .card-btn { font-size: 0.78em; color: #888; cursor: pointer; background: none; border: none; font-family: inherit; padding: 2px 4px; }
    .card-btn:active { color: #333; }

    .add-card { background: #f9fef9; border: 2px dashed #a5d6a7; border-radius: 14px; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
    .add-card:active { background: #e8f5e9; }
    .add-icon { font-size: 2em; color: #4caf50; }
    .add-text { font-size: 0.78em; color: #4caf50; font-weight: 700; margin-top: 6px; }

    /* Modal */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: none; align-items: flex-end; }
    .overlay.open { display: flex; }
    .modal { background: white; border-radius: 22px 22px 0 0; width: 100%; max-height: 92vh; overflow-y: auto; }
    .modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 12px auto 0; }
    .modal-head { padding: 14px 18px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; }
    .modal-title { font-size: 1em; font-weight: 700; }
    .modal-close { background: #f0f0f0; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 1em; cursor: pointer; }
    .modal-body { padding: 14px 18px 30px; }

    .fg { margin-bottom: 13px; }
    .fg label { display: block; font-size: 0.8em; font-weight: 700; color: #555; margin-bottom: 5px; }
    .fg input, .fg select, .fg textarea { width: 100%; padding: 11px 14px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 0.95em; font-family: inherit; background: #fafafa; }
    .fg input:focus, .fg select:focus, .fg textarea:focus { outline: none; border-color: #4caf50; background: white; }
    .fg textarea { resize: none; min-height: 80px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* תגובות */
    .comments-section { background: #f9f9f9; border-radius: 12px; padding: 12px; margin-bottom: 13px; }
    .comments-title { font-size: 0.82em; font-weight: 700; color: #555; margin-bottom: 10px; }
    .comment-item { background: white; border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; font-size: 0.82em; line-height: 1.4; position: relative; }
    .comment-del { position: absolute; top: 6px; left: 6px; background: none; border: none; color: #ccc; cursor: pointer; font-size: 0.9em; }
    .comment-del:hover { color: #e53935; }
    .comment-input-row { display: flex; gap: 8px; margin-top: 8px; }
    .comment-input-row input { flex: 1; padding: 8px 12px; border: 1.5px solid #e0e0e0; border-radius: 20px; font-size: 0.85em; font-family: inherit; }
    .comment-input-row input:focus { outline: none; border-color: #4caf50; }
    .comment-send { background: #4caf50; color: white; border: none; border-radius: 20px; padding: 8px 14px; font-size: 0.85em; cursor: pointer; font-family: inherit; font-weight: 700; }

    /* AI */
    .ai-section { background: #f8f0ff; border-radius: 12px; padding: 12px; margin-bottom: 14px; border: 1px solid #e1bee7; }
    .ai-head { font-size: 0.82em; font-weight: 700; color: #7b1fa2; margin-bottom: 10px; }
    .ai-imgs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .ai-img-box { border: 1.5px dashed #ce93d8; border-radius: 10px; overflow: hidden; background: white; }
    .ai-img-box-inner { padding: 10px; text-align: center; cursor: pointer; }
    .ai-img-box input { display: none; }
    .ai-img-label { font-size: 0.75em; color: #9c27b0; font-weight: 600; }
    .ai-cam-btn { display: block; width: 100%; padding: 6px; background: #f3e5f5; border: none; font-size: 0.72em; color: #9c27b0; cursor: pointer; font-family: inherit; border-top: 1px solid #e1bee7; }
    .ai-img-preview { width: 100%; aspect-ratio: 1; object-fit: cover; display: none; }
    .ai-result { font-size: 0.82em; background: white; border-radius: 8px; padding: 8px; margin-top: 8px; border: 1px solid #e1bee7; display: none; }

    .upload-area { border: 1.5px dashed #ddd; border-radius: 10px; overflow: hidden; background: #fafafa; cursor: pointer; }
    .upload-area-inner { padding: 14px; text-align: center; }
    .upload-area input { display: none; }
    .upload-label { font-size: 0.82em; color: #888; }
    .upload-label span { display: block; font-size: 1.3em; margin-bottom: 4px; }
    .upload-cam-btn { display: block; width: 100%; padding: 8px; background: #f5f5f5; border: none; border-top: 1px solid #eee; font-size: 0.82em; color: #555; cursor: pointer; font-family: inherit; }
    .img-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .img-prev-item { position: relative; }
    .img-prev-item img { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; display: block; }
    .img-prev-del { position: absolute; top: -4px; left: -4px; background: #ef5350; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 0.65em; cursor: pointer; }

    .btn { width: 100%; padding: 13px; border: none; border-radius: 12px; font-size: 0.95em; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 8px; }
    .btn-green { background: #43a047; color: white; }
    .btn-purple { background: #8e24aa; color: white; }
    .btn-red { background: #e53935; color: white; }
    .btn-gray { background: #f0f0f0; color: #444; }
    .btn:active { opacity: 0.8; }
    .btn:disabled { opacity: 0.5; }

    .divider { height: 1px; background: #f0f0f0; margin: 14px 0; }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 22px; border-radius: 22px; font-size: 0.85em; z-index: 999; opacity: 0; transition: opacity 0.25s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .loading { text-align: center; padding: 48px 0; color: #aaa; grid-column: 1/-1; }
    .spin { display: inline-block; width: 28px; height: 28px; border: 3px solid #eee; border-top-color: #4caf50; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <div class="header-title">🪙 Coin Index Pro</div>
  <div class="header-stats" id="stats">טוען...</div>
</div>

<div class="toolbar">
  <div class="filter-scroll">
    <button class="chip active" data-f="all" onclick="setFilter('all')">הכל</button>
    <button class="chip" data-f="ישראל" onclick="setFilter('ישראל')">🇮🇱 ישראל</button>
    <button class="chip" data-f="המנדט הבריטי" onclick="setFilter('המנדט הבריטי')">🇬🇧 מנדט</button>
    <button class="chip" data-f="האימפריה העות'מאנית" onclick="setFilter('האימפריה העות\'מאנית')">🕌 עות'מאני</button>
    <button class="chip" data-f='ארה"ב' onclick='setFilter("ארה\"ב")'>🇺🇸 ארה"ב</button>
    <button class="chip" data-f="רוסיה" onclick="setFilter('רוסיה')">🇷🇺 רוסיה</button>
    <button class="chip" data-f="גרמניה" onclick="setFilter('גרמניה')">🇩🇪 גרמניה</button>
    <button class="chip" data-f="ברית המועצות" onclick="setFilter('ברית המועצות')">☭ בריה"מ</button>
  </div>
  <div class="cols-control">
    <span class="cols-label">עמודות:</span>
    <button class="cols-btn" onclick="changeCols(-1)">−</button>
    <span class="cols-num" id="colsNum">2</span>
    <button class="cols-btn" onclick="changeCols(1)">+</button>
  </div>
</div>

<div class="grid" id="grid">
  <div class="loading"><div class="spin"></div><br><br>טוען...</div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <span class="modal-title" id="modalTitle">הוספת מטבע</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">

      <!-- AI Section -->
      <div class="ai-section" id="aiSection">
        <div class="ai-head">🤖 זיהוי אוטומטי עם AI</div>
        <div class="ai-imgs">
          <div class="ai-img-box">
            <div style="padding:8px;text-align:center;">
              <div class="ai-img-label" style="margin-bottom:8px;">פנים המטבע</div>
              <img class="ai-img-preview" id="aiFrontPrev">
              <div style="display:flex;gap:6px;margin-top:6px;">
                <label style="flex:1;background:#f3e5f5;border-radius:8px;padding:7px;text-align:center;cursor:pointer;font-size:0.75em;color:#9c27b0;font-weight:700;">
                  <input type="file" id="aiFrontFile" accept="image/*" style="display:none" onchange="aiPreview('front',this)">
                  🖼️ גלריה
                </label>
                <label style="flex:1;background:#ede7f6;border-radius:8px;padding:7px;text-align:center;cursor:pointer;font-size:0.75em;color:#7b1fa2;font-weight:700;">
                  <input type="file" id="aiFrontCam" accept="image/*" capture="environment" style="display:none" onchange="aiPreview('front',this)">
                  📸 צלם
                </label>
              </div>
            </div>
          </div>
          <div class="ai-img-box">
            <div style="padding:8px;text-align:center;">
              <div class="ai-img-label" style="margin-bottom:8px;">גב (אופציונלי)</div>
              <img class="ai-img-preview" id="aiBackPrev">
              <div style="display:flex;gap:6px;margin-top:6px;">
                <label style="flex:1;background:#f3e5f5;border-radius:8px;padding:7px;text-align:center;cursor:pointer;font-size:0.75em;color:#9c27b0;font-weight:700;">
                  <input type="file" id="aiBackFile" accept="image/*" style="display:none" onchange="aiPreview('back',this)">
                  🖼️ גלריה
                </label>
                <label style="flex:1;background:#ede7f6;border-radius:8px;padding:7px;text-align:center;cursor:pointer;font-size:0.75em;color:#7b1fa2;font-weight:700;">
                  <input type="file" id="aiBackCam" accept="image/*" capture="environment" style="display:none" onchange="aiPreview('back',this)">
                  📸 צלם
                </label>
              </div>
            </div>
          </div>
        </div>
        <button class="btn btn-purple" id="identifyBtn" onclick="identifyCoin()">✨ זהה מטבע</button>
        <div class="ai-result" id="aiResult"></div>
      </div>

      <!-- Form -->
      <div class="fg" style="grid-column:1/-1">
        <label>שם המטבע</label>
        <input type="text" id="fName" placeholder="שם המטבע...">
      </div>
      <div class="row2" style="margin-bottom:13px">
        <div class="fg" style="margin-bottom:0">
          <label>מחיר (₪)</label>
          <input type="number" id="fPrice" placeholder="0">
        </div>
        <div class="fg" style="margin-bottom:0">
          <label>שנה</label>
          <input type="text" id="fYear" placeholder="שנה">
        </div>
      </div>
      <div class="row2" style="margin-bottom:13px">
        <div class="fg" style="margin-bottom:0">
          <label>מדינה</label>
          <select id="fCountry">
            <option>ישראל</option><option>המנדט הבריטי</option>
            <option>האימפריה העות'מאנית</option><option>פרס / איראן</option>
            <option>מצרים</option><option>סוריה</option><option>לבנון</option>
            <option>ירדן</option><option>עיראק</option><option>ערב הסעודית</option>
            <option>תורכיה</option><option>הודו</option><option>סין</option>
            <option>יפן</option><option>קוריאה</option><option>בריטניה</option>
            <option>צרפת</option><option>גרמניה</option><option>האימפריה הגרמנית</option>
            <option>רייך השלישי</option><option>פרוסיה</option><option>אוסטריה</option>
            <option>האימפריה האוסטרו-הונגרית</option><option>איטליה</option>
            <option>האימפריה הרומית</option><option>ספרד</option><option>פורטוגל</option>
            <option>הולנד</option><option>שוודיה</option><option>פולין</option>
            <option>יוון</option><option>רוסיה</option><option>ברית המועצות</option>
            <option>האימפריה הרוסית</option><option>ארה"ב</option><option>קנדה</option>
            <option>ברזיל</option><option>דרום אפריקה</option><option>מרוקו</option>
            <option>תוניסיה</option><option>אלג'יריה</option><option>לוב</option>
            <option>אחר</option>
          </select>
        </div>
        <div class="fg" style="margin-bottom:0">
          <label>חומר</label>
          <select id="fMaterial">
            <option>כסף</option><option>זהב</option><option>נחושת</option>
            <option>ניקל</option><option>ברונזה</option><option>אלומיניום</option>
            <option>מתכת מעורבת</option>
          </select>
        </div>
      </div>

      <!-- Upload -->
      <div class="fg">
        <label>תמונות</label>
        <div style="display:flex;gap:8px;">
          <label style="flex:1;background:#f5f5f5;border:1.5px dashed #ddd;border-radius:10px;padding:12px;text-align:center;cursor:pointer;">
            <input type="file" id="fImages" accept="image/*" multiple style="display:none" onchange="previewImgs(this)">
            <div style="font-size:1.4em;margin-bottom:4px;">🖼️</div>
            <div style="font-size:0.78em;color:#777;font-weight:600;">גלריה</div>
          </label>
          <label style="flex:1;background:#f5f5f5;border:1.5px dashed #ddd;border-radius:10px;padding:12px;text-align:center;cursor:pointer;">
            <input type="file" id="fImagesCam" accept="image/*" capture="environment" style="display:none" onchange="previewImgs(this)">
            <div style="font-size:1.4em;margin-bottom:4px;">📸</div>
            <div style="font-size:0.78em;color:#777;font-weight:600;">צלם</div>
          </label>
        </div>
        <div class="img-preview" id="imgPreview"></div>
      </div>

      <!-- תגובות -->
      <div class="divider"></div>
      <div class="comments-section" id="commentsSection" style="display:none">
        <div class="comments-title">💬 תגובות</div>
        <div id="commentsList"></div>
        <div class="comment-input-row">
          <input type="text" id="commentInput" placeholder="כתוב תגובה..." onkeydown="if(event.key==='Enter')addComment()">
          <button class="comment-send" onclick="addComment()">שלח</button>
        </div>
      </div>

      <div class="divider"></div>
      <button class="btn btn-green" id="saveBtn" onclick="saveCoin()">💾 שמור מטבע</button>
      <button class="btn btn-red" id="deleteBtn" onclick="deleteCoin()" style="display:none">🗑️ מחק מטבע</button>
      <button class="btn btn-gray" onclick="closeModal()">ביטול</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://coins-api-qkva.onrender.com';
let coins=[], filter='all', cols=2;
let editId=null, existImgs=[], newFiles=[], aiFront=null, aiBack=null;
let comments={}; // {coinId: [text,...]}

function initCols() {
  cols = window.innerWidth >= 900 ? 4 : window.innerWidth >= 600 ? 3 : 1;
  document.getElementById('colsNum').textContent = cols;
  applyGrid();
}

function applyGrid() {
  document.getElementById('grid').style.gridTemplateColumns = `repeat(${cols},1fr)`;
}

function changeCols(d) {
  cols = Math.max(1, Math.min(6, cols+d));
  document.getElementById('colsNum').textContent = cols;
  applyGrid();
}

function setFilter(f) {
  filter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active', c.dataset.f===f));
  render();
}

async function load() {
  try {
    const r = await fetch(`${API}/coins`);
    coins = await r.json();
    // טען תגובות מ-localStorage
    const saved = localStorage.getItem('coinComments');
    if(saved) comments = JSON.parse(saved);
    render();
  } catch { document.getElementById('grid').innerHTML='<div class="loading">שגיאה בטעינה</div>'; }
}

function saveComments() {
  localStorage.setItem('coinComments', JSON.stringify(comments));
}

function render() {
  const list = filter==='all' ? coins : coins.filter(c=>c.country===filter);
  const total = coins.reduce((s,c)=>s+(parseFloat(c.price)||0),0);
  document.getElementById('stats').textContent = `${coins.length} מטבעות | ${total.toLocaleString()} ₪`;
  const grid = document.getElementById('grid');
  applyGrid();
  grid.innerHTML = '';

  list.forEach(c => {
    const imgs = (c.images||'').split('|').filter(u=>u.startsWith('http'));
    const coinComments = comments[String(c.id)] || [];
    const badge = coinComments.length ? `<div class="comments-badge">💬 ${coinComments.length}</div>` : '';
    
    const imgHtml = imgs.length
      ? `<div class="coin-imgs" style="position:relative">${imgs.map(u=>`<div class="coin-img-slide"><img src="${u}" loading="lazy"></div>`).join('')}${badge}</div>`
      : `<div class="coin-no-img" style="position:relative">🪙${badge}</div>`;

    const div = document.createElement('div');
    div.className = 'coin-card';
    div.innerHTML = `
      ${imgHtml}
      <div class="coin-body">
        <div class="coin-row1">
          <span class="coin-name">${c.name||''}</span>
          <span class="coin-price">${c.price?c.price+' ₪':''}</span>
        </div>
        <div class="tags">
          <span class="tag tag-c">${c.country||''}</span>
          <span class="tag tag-m">${c.material||''}</span>
          <span class="tag tag-y">${c.year||''}</span>
        </div>
      </div>
      <div class="card-actions">
        <button class="card-btn" onclick="openEdit('${c.id}')">✏️ עריכה</button>
        <button class="card-btn" onclick="shareCoin('${c.id}')">🔗 שתף</button>
      </div>
    `;
    grid.appendChild(div);
  });

  const add = document.createElement('div');
  add.className = 'add-card';
  add.innerHTML = '<div class="add-icon">＋</div><div class="add-text">הוסף מטבע</div>';
  add.onclick = openAdd;
  grid.appendChild(add);
}

function shareCoin(id) {
  const c = coins.find(x=>String(x.id)===String(id));
  if(!c) return;
  const text = `🪙 ${c.name}\n📅 ${c.year||''} | 🌍 ${c.country||''} | ⚗️ ${c.material||''}\n💰 ${c.price||''} ₪`;
  if(navigator.share) {
    navigator.share({ title: c.name, text });
  } else {
    navigator.clipboard.writeText(text).then(()=>toast('📋 הועתק ללוח!'));
  }
}

function openAdd() {
  editId=null; existImgs=[]; newFiles=[]; aiFront=null; aiBack=null;
  document.getElementById('modalTitle').textContent='הוספת מטבע חדש';
  document.getElementById('fName').value='';
  document.getElementById('fPrice').value='';
  document.getElementById('fYear').value='';
  document.getElementById('fCountry').value='ישראל';
  document.getElementById('fMaterial').value='כסף';
  document.getElementById('fImages').value='';
  document.getElementById('imgPreview').innerHTML='';
  document.getElementById('aiSection').style.display='';
  document.getElementById('deleteBtn').style.display='none';
  document.getElementById('commentsSection').style.display='none';
  document.getElementById('aiFrontPrev').style.display='none';
  document.getElementById('aiBackPrev').style.display='none';
  document.getElementById('aiResult').style.display='none';
  document.getElementById('overlay').classList.add('open');
}

function openEdit(id) {
  const c = coins.find(x=>String(x.id)===String(id));
  if(!c) return;
  editId=id; existImgs=(c.images||'').split('|').filter(u=>u.startsWith('http')); newFiles=[]; aiFront=null; aiBack=null;
  document.getElementById('modalTitle').textContent='עריכת מטבע';
  document.getElementById('fName').value=c.name||'';
  document.getElementById('fPrice').value=c.price||'';
  document.getElementById('fYear').value=c.year||'';
  document.getElementById('fCountry').value=c.country||'ישראל';
  document.getElementById('fMaterial').value=c.material||'כסף';
  document.getElementById('fImages').value='';
  document.getElementById('aiSection').style.display='none';
  document.getElementById('deleteBtn').style.display='';
  renderPreview();
  renderComments(id);
  document.getElementById('commentsSection').style.display='';
  document.getElementById('overlay').classList.add('open');
}

function renderComments(id) {
  const list = comments[String(id)] || [];
  document.getElementById('commentsList').innerHTML = list.map((t,i)=>`
    <div class="comment-item">
      ${t}
      <button class="comment-del" onclick="deleteComment('${id}',${i})">✕</button>
    </div>
  `).join('') || '<div style="font-size:0.8em;color:#bbb;margin-bottom:6px">אין תגובות עדיין</div>';
  document.getElementById('commentInput').value='';
}

function addComment() {
  const t = document.getElementById('commentInput').value.trim();
  if(!t || !editId) return;
  if(!comments[String(editId)]) comments[String(editId)]=[];
  comments[String(editId)].push(t);
  saveComments();
  renderComments(editId);
  render();
}

function deleteComment(id, i) {
  comments[String(id)].splice(i,1);
  saveComments();
  renderComments(id);
  render();
}

function renderPreview() {
  document.getElementById('imgPreview').innerHTML =
    existImgs.map((u,i)=>`<div class="img-prev-item"><img src="${u}"><button class="img-prev-del" onclick="removeExist(${i})">✕</button></div>`).join('') +
    newFiles.map((f,i)=>`<div class="img-prev-item"><img src="${URL.createObjectURL(f)}"><button class="img-prev-del" onclick="removeNew(${i})">✕</button></div>`).join('');
}

function removeExist(i) { existImgs.splice(i,1); renderPreview(); }
function removeNew(i) { newFiles.splice(i,1); renderPreview(); }

function previewImgs(input) {
  newFiles = [...newFiles, ...Array.from(input.files)];
  input.value='';
  renderPreview();
}

// פתיחת מצלמה ישירה
function openCamera(inputId) {
  const input = document.getElementById(inputId);
  input.setAttribute('capture','environment');
  input.click();
}

function openCameraMulti() {
  const tmp = document.createElement('input');
  tmp.type='file'; tmp.accept='image/*'; tmp.capture='environment';
  tmp.onchange = e => previewImgs(e.target);
  tmp.click();
}

function aiPreview(side, input) {
  const f=input.files[0]; if(!f) return;
  if(side==='front') { aiFront=f; const img=document.getElementById('aiFrontPrev'); img.src=URL.createObjectURL(f); img.style.display='block'; }
  else { aiBack=f; const img=document.getElementById('aiBackPrev'); img.src=URL.createObjectURL(f); img.style.display='block'; }
}

async function identifyCoin() {
  if(!aiFront){toast('העלה תמונת פנים של המטבע');return;}
  const btn=document.getElementById('identifyBtn');
  btn.textContent='🔍 מזהה...'; btn.disabled=true;
  try {
    const fd=new FormData();
    fd.append('front',aiFront);
    if(aiBack) fd.append('back',aiBack);
    const r=await fetch(`${API}/identify`,{method:'POST',body:fd});
    const d=await r.json();
    if(d.error){toast('שגיאה: '+d.error);return;}
    document.getElementById('fName').value=d.name||'';
    document.getElementById('fPrice').value=d.price||'';
    document.getElementById('fYear').value=d.year||'';
    // תיקון: וודא שהחומר והמדינה מוגדרים נכון
    const countries=[...document.getElementById('fCountry').options].map(o=>o.value);
    const materials=[...document.getElementById('fMaterial').options].map(o=>o.value);
    if(d.country && countries.includes(d.country)) document.getElementById('fCountry').value=d.country;
    if(d.material && materials.includes(d.material)) document.getElementById('fMaterial').value=d.material;
    const res=document.getElementById('aiResult');
    res.style.display='block';
    res.innerHTML=`✅ <b>${d.name}</b> | ${d.country} | ${d.year} | ${d.material} | ~${d.price} ₪`;
    if(aiFront) newFiles.unshift(aiFront);
    if(aiBack) newFiles.push(aiBack);
    renderPreview();
  } catch(e){toast('שגיאת זיהוי: '+e.message);}
  finally{btn.textContent='✨ זהה מטבע';btn.disabled=false;}
}

async function uploadFile(f) {
  const fd=new FormData(); fd.append('file',f);
  const r=await fetch(`${API}/upload`,{method:'POST',body:fd});
  return (await r.json()).url;
}

async function saveCoin() {
  const name=document.getElementById('fName').value.trim();
  if(!name){toast('נא להזין שם');return;}
  const btn=document.getElementById('saveBtn');
  btn.textContent='⏳ שומר...'; btn.disabled=true;
  try {
    const urls=[];
    for(const f of newFiles){const u=await uploadFile(f);if(u)urls.push(u);}
    const allImgs=[...existImgs,...urls];
    const data={
      id:editId||String(Date.now()),
      name,
      price:document.getElementById('fPrice').value,
      country:document.getElementById('fCountry').value,
      material:document.getElementById('fMaterial').value,
      year:document.getElementById('fYear').value,
      images:allImgs.join('|'),
      comments:''
    };
    if(editId) await fetch(`${API}/coins/${editId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    else await fetch(`${API}/coins`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    closeModal(); toast('✅ נשמר!'); await load();
  } catch{toast('שגיאה בשמירה');}
  finally{btn.textContent='💾 שמור מטבע';btn.disabled=false;}
}

async function deleteCoin() {
  if(!confirm('למחוק את המטבע?')) return;
  await fetch(`${API}/coins/${editId}`,{method:'DELETE'});
  if(comments[String(editId)]) { delete comments[String(editId)]; saveComments(); }
  closeModal(); toast('נמחק'); await load();
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function overlayClick(e) { if(e.target===document.getElementById('overlay')) closeModal(); }

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

initCols();
load();
</script>
</body>
</html>
